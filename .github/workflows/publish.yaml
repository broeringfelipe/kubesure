name: Publish

# TODO: Remove this when the release workflow is ready
on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag generated by Semantic Release (ex: v0.1.0)'
        required: true
        default: 'latest'

# TODO: Uncomment this when the release workflow is ready
# on:
#   release:
#     types: [published]

jobs:
  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup UV
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build (sdist and wheel) with uv
        run: uv build

      - name: Send to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docker:
    name: Publish container image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Publish
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true

          # TODO: Remove this when the release workflow is ready
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/kubesure:latest
            ${{ vars.DOCKERHUB_USERNAME }}/kubesure:${{ github.event.inputs.version_tag }}
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.event.inputs.version_tag }}

          # TODO: Uncomment this when the release workflow is ready
          # tags: |
          #   ${{ secrets.DOCKERHUB_USERNAME }}/kubesure:latest
          #   ${{ secrets.DOCKERHUB_USERNAME }}/kubesure:${{ github.event.release.tag_name }}
          #   ghcr.io/${{ github.repository }}:latest
          #   ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
